<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <title>AETHER STICKMAN | CLEAR FACE v27.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }
        #boot { position: absolute; inset: 0; background: #000; z-index: 100; display: flex; align-items: center; justify-content: center; color: white; font-family: 'Orbitron'; letter-spacing: 5px; }
    </style>
</head>
<body>

<div id="boot">SYNCING_CLEAR_FACE_PROTOCOL...</div>
<canvas id="canvas"></canvas>
<video id="video" style="display:none" playsinline></video>

<script type="module">
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('video');
    let results = null;

    // 鏡像座標映射
    const getXY = (lm) => lm ? { x: (1 - lm.x) * canvas.width, y: lm.y * canvas.height } : null;

    // 1. 繪製「空心圓環頭部」：不遮臉的火柴人
    function drawHaloHead(face, nose) {
        if (!face || !nose) return;
        const chin = getXY(face[152]);
        const top = getXY(face[10]);
        const rY = Math.hypot(chin.x - top.x, chin.y - top.y) * 0.55; // 稍微放大一點，確保包圍整張臉
        const cX = nose.x, cY = nose.y - rY * 0.05;

        ctx.save();
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 5; // 較粗的線條才有火柴人感
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#00d2ff";
        
        ctx.beginPath();
        ctx.arc(cX, cY, rY, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
    }

    function drawJoint(pt, size = 6) {
        if (!pt) return;
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2;
        ctx.shadowBlur = 10; ctx.shadowColor = "#00d2ff";
        ctx.beginPath();
        ctx.moveTo(pt.x, pt.y - size); ctx.lineTo(pt.x + size, pt.y);
        ctx.lineTo(pt.x, pt.y + size); ctx.lineTo(pt.x - size, pt.y);
        ctx.closePath(); ctx.stroke();
    }

    function Render() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // A. 繪製真實全彩背景 (100% 透明度，看到真正的你)
        ctx.save();
        ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
        ctx.globalAlpha = 1.0; 
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        ctx.restore();

        if (results) {
            const pose = results.poseLandmarks;
            const hands = [results.leftHandLandmarks, results.rightHandLandmarks];

            ctx.strokeStyle = "#ffffff";
            ctx.shadowBlur = 15; ctx.shadowColor = "rgba(0, 210, 255, 0.8)";

            if (pose) {
                // 身體連線
                ctx.lineWidth = 4;
                const pairs = [[11,12],[11,13],[13,15],[12,14],[14,16],[23,24],[23,25],[25,27],[24,26],[26,28],[11,23],[12,24]];
                pairs.forEach(([i,j]) => {
                    const p1 = getXY(pose[i]), p2 = getXY(pose[j]);
                    if(p1 && p2) { ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); }
                });
                
                // 關節與空心頭 (不遮臉)
                [11,12,13,14,15,16,23,24,25,26,27,28].forEach(i => drawJoint(getXY(pose[i])));
                drawHaloHead(results.faceLandmarks, getXY(pose[0]));
            }

            hands.forEach(hand => {
                if (hand) {
                    ctx.lineWidth = 2;
                    const hPairs = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]];
                    hPairs.forEach(([i,j]) => {
                        const p1 = getXY(hand[i]), p2 = getXY(hand[j]);
                        if(p1 && p2) { ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); }
                    });
                    hand.forEach(p => drawJoint(getXY(p), 3));
                }
            });
        }
        requestAnimationFrame(Render);
    }

    const holistic = new Holistic({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${f}` });
    holistic.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
    holistic.onResults(r => results = r);

    setTimeout(() => {
        document.getElementById('boot').style.display = 'none';
        new Camera(video, { onFrame: async () => await holistic.send({image: video}), width: 1280, height: 720 }).start();
        Render();
    }, 2000);
</script>
</body>
</html>
