<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AETHER | MOBILE_SMOOTH</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; object-fit: cover; }
        #boot { position: absolute; inset: 0; background: #000; z-index: 100; display: flex; align-items: center; justify-content: center; color: #00ffa3; font-family: 'Orbitron'; font-size: 14px; }
    </style>
</head>
<body>

<div id="boot">OPTIMIZING_FOR_MOBILE...</div>
<canvas id="canvas"></canvas>
<video id="video" style="display:none" playsinline></video>

<script type="module">
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('video');
    let results = null;
    let lastTime = 0;

    const getXY = (lm) => lm ? { x: (1 - lm.x) * canvas.width, y: lm.y * canvas.height } : null;

    function drawHaloHead(face, nose) {
        if (!face || !nose) return;
        const chin = getXY(face[152]);
        const top = getXY(face[10]);
        if(!chin || !top) return;
        const rY = Math.hypot(chin.x - top.x, chin.y - top.y) * 0.55;
        ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.arc(nose.x, nose.y - rY * 0.05, rY, 0, Math.PI * 2); ctx.stroke();
    }

    function Render(currentTime) {
        requestAnimationFrame(Render);
        // 優化：強制鎖定最高 30fps，避免手機過熱掉幀
        if (currentTime - lastTime < 33) return; 
        lastTime = currentTime;

        if (canvas.width !== window.innerWidth) {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        // 1. 繪製背景 (保持鏡像)
        ctx.save();
        ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        ctx.restore();

        if (results) {
            const pose = results.poseLandmarks;
            const hands = [results.leftHandLandmarks, results.rightHandLandmarks];

            ctx.strokeStyle = "#ffffff";
            ctx.shadowBlur = 10; ctx.shadowColor = "#00ffa3"; // 減小模糊半徑提升效能

            if (pose) {
                ctx.lineWidth = 3;
                const pairs = [[11,12],[11,13],[13,15],[12,14],[14,16],[23,24],[23,25],[25,27],[24,26],[26,28],[11,23],[12,24]];
                pairs.forEach(([i,j]) => {
                    const p1 = getXY(pose[i]), p2 = getXY(pose[j]);
                    if(p1 && p2) { ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); }
                });
                drawHaloHead(results.faceLandmarks, getXY(pose[0]));
            }

            hands.forEach(hand => {
                if (hand) {
                    ctx.lineWidth = 1.5;
                    const hPairs = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]];
                    hPairs.forEach(([i,j]) => {
                        const p1 = getXY(hand[i]), p2 = getXY(hand[j]);
                        if(p1 && p2) { ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); }
                    });
                }
            });
            ctx.shadowBlur = 0;
        }
    }

    // 💡 關鍵效能設定：modelComplexity 設為 0
    const holistic = new Holistic({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${f}` });
    holistic.setOptions({ 
        modelComplexity: 0, 
        smoothLandmarks: true, 
        minDetectionConfidence: 0.5, 
        minTrackingConfidence: 0.5 
    });
    holistic.onResults(r => results = r);

    setTimeout(() => {
        document.getElementById('boot').style.display = 'none';
        // 💡 關鍵效能設定：將解析度降至 480p 以下
        new Camera(video, { 
            onFrame: async () => await holistic.send({image: video}), 
            width: 480, height: 270 
        }).start();
        Render();
    }, 2000);
</script>
</body>
</html>
